<svg width="500" height="800" viewBox="0 0 500 800" xmlns="http://www.w3.org/2000/svg">
  <style>
    body { background: #ffffff; }
    .state {
      fill: #f9fafc;
      stroke: #2c3e50;
      stroke-width: 2;
    }
    .label {
      font: 16px sans-serif;
      fill: #2c3e50;
      text-anchor: middle;
      dominant-baseline: middle;
    }
    .edgeBlue {
      stroke: #2563eb;
      stroke-width: 2.5;
      fill: none;
      marker-end: url(#arrowBlue);
    }
    .edgeRed {
      stroke: #dc2626;
      stroke-width: 2.5;
      fill: none;
      stroke-dasharray: 6,4;
      marker-end: url(#arrowRed);
    }
    .text {
      font: 13px sans-serif;
      fill: #111827;
    }
  </style>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- States (vertical layout) -->
  <circle class="state" cx="250" cy="120" r="40"/>
  <text class="label" x="250" y="120">M</text>

  <circle class="state" cx="250" cy="280" r="40"/>
  <text class="label" x="250" y="280">E</text>

  <circle class="state" cx="250" cy="440" r="40"/>
  <text class="label" x="250" y="440">S</text>

  <circle class="state" cx="250" cy="600" r="40"/>
  <text class="label" x="250" y="600">I</text>

  <!-- LEFT (Processor - Blue) -->
  <path class="edgeBlue" d="M210 600 C120 500, 120 200, 210 120"/>
  <text class="text" x="70" y="380">PrWr / BusRdX</text>

  <path class="edgeBlue" d="M210 600 C140 550, 140 480, 210 440"/>
  <text class="text" x="110" y="520">PrRd</text>

  <path class="edgeBlue" d="M210 440 C140 400, 140 320, 210 280"/>
  <text class="text" x="110" y="360">PrRd</text>

  <path class="edgeBlue" d="M210 280 C140 240, 140 160, 210 120"/>
  <text class="text" x="110" y="200">PrWr</text>

  <!-- Self loops -->
  <path class="edgeBlue" d="M250 80 C300 40, 300 160, 250 160"/>
  <text class="text" x="310" y="110">PrRd/PrWr</text>

  <path class="edgeBlue" d="M250 240 C300 200, 300 320, 250 320"/>
  <text class="text" x="310" y="280">PrRd</text>

  <path class="edgeBlue" d="M250 400 C300 360, 300 480, 250 480"/>
  <text class="text" x="310" y="440">PrRd</text>

  <!-- RIGHT (Bus Snooping - Red dashed) -->
  <path class="edgeRed" d="M290 120 C380 200, 380 520, 290 600"/>
  <text class="text" x="370" y="380">BusRdX / Flush</text>

  <path class="edgeRed" d="M290 120 C360 180, 360 260, 290 280"/>
  <text class="text" x="360" y="210">BusRd / Flush</text>

  <path class="edgeRed" d="M290 280 C360 340, 360 400, 290 440"/>
  <text class="text" x="360" y="360">BusRd</text>

  <path class="edgeRed" d="M290 440 C360 500, 360 560, 290 600"/>
  <text class="text" x="360" y="540">BusRdX / Upgr</text>

  <path class="edgeRed" d="M290 120 C420 200, 420 520, 290 600"/>
  <text class="text" x="420" y="420">BusRdX (writeback)</text>

  <!-- Legend -->
  <text x="60" y="760" class="text" fill="#2563eb">Blue: Processor Actions</text>
  <text x="260" y="760" class="text" fill="#dc2626">Red (dashed): Bus Snooping</text>
</svg>